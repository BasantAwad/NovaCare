name: novacare_app
description: NovaCare Assistant - Assistive Rover Remote Control & Monitoring Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_database: ^11.2.1
  firebase_messaging: ^15.2.1
  firebase_auth: ^5.4.1

  # Bluetooth Low Energy
  flutter_blue_plus: ^1.35.3

  # State Management
  provider: ^6.1.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  lottie: ^3.3.1

  # Utilities
  shared_preferences: ^2.3.4
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  http: ^1.6.0
  flutter_tts: ^4.2.5
  file_picker: ^11.0.2
  flutter_local_notifications: 19.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/NovaLogo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
