version: '3.8'

services:
  # ==========================================
  # SERBOT RUNTIME (runs on the robot itself)
  # ==========================================
  
  serbot-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serbot
    container_name: novacare-runtime-serbot
    restart: always
    network_mode: "host"
    privileged: true
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - ROBOT_MODE=serbot
      - ORCHESTRATOR_PORT=9999
      - DISPLAY=:0
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/dsp:/dev/dsp"
    depends_on:
      - laptop-services

  # ==========================================
  # LAPTOP SERVICES (heavy AI on workstation)
  # ==========================================
  
  laptop-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laptop
    container_name: novacare-runtime-laptop
    restart: always
    network_mode: "host"
    environment:
      - ROBOT_MODE=laptop
      - LLM_PORT=5000
      - ASL_PORT=8000
      - ROBOT_HAL_PORT=9000
    ports:
      - "5000:5000"  # LLM service
      - "8000:8000"  # ASL service
      - "8001:8001"  # TTS service
      - "8002:8002"  # Additional services

# ==========================================
# NETWORK CONFIGURATION
# ==========================================
# Using host network for low-latency communication
# between SERBot and laptop services
